name: Sync Grants and funding

on:
  schedule:
    # Runs after the MUR refresh windows so production data updates in a predictable morning sequence.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-grants-funding
  cancel-in-progress: false

jobs:
  sync:
    name: Import Grants data and publish frontend cache
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import live Grants and funding data
        run: npm run import:grants:live

      - name: Audit Grants coverage
        run: npm run audit:grants

      - name: Check for generated Grants updates
        id: changes
        run: |
          if git diff --quiet -- lib/generated/grants.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with updated Grants data
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Commit updated Grants cache
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "research-radar-bot"
          git config user.email "actions@github.com"
          git add lib/generated/grants.json
          git commit -m "Update Grants funding cache"
          git pull --rebase origin main
          git push

      - name: Report no changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "No Grants changes detected."
