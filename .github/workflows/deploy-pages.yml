name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows:
      - Sync MUR positions
      - Sync Grants and funding
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static export
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://rritaly.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:static

      - name: Verify static export
        shell: bash
        run: |
          test -f out/index.html
          test -f out/CNAME
          grep -q "Research Radar Italy" out/index.html
          grep -q "rritaly.com" out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live site
        shell: bash
        run: |
          for attempt in {1..12}; do
            status="$(curl -L -sS -o /tmp/rritaly.html -w "%{http_code}" https://rritaly.com/ || true)"
            if [ "$status" = "200" ] && grep -q "Research Radar Italy" /tmp/rritaly.html; then
              echo "rritaly.com is live."
              exit 0
            fi

            echo "Attempt $attempt failed with status $status; retrying..."
            sleep 10
          done

          exit 1
